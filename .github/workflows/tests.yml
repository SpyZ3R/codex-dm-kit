name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python examples/demo/tools/codex_dm.py validate --root examples/demo
      - run: python -m pip install .
      - name: Smoke-test the installed package outside the repository
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "codex-dm-smoke"
          $answers = Get-Content "$env:GITHUB_WORKSPACE/examples/onboarding_answers.ru.json" -Raw -Encoding UTF8
          Set-Location $env:RUNNER_TEMP
          $answers | python -m codex_dm_kit create --answers - --target $target
          python (Join-Path $target "tools/codex_dm.py") validate
