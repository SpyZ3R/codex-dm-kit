name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python -m pip install .
      - name: Smoke-test the installed package outside the repository
        run: |
          cd "$RUNNER_TEMP"
          python -m codex_dm_kit create --answers "$GITHUB_WORKSPACE/examples/onboarding_answers.ru.json" --target "$RUNNER_TEMP/codex-dm-smoke"
          python "$RUNNER_TEMP/codex-dm-smoke/tools/codex_dm.py" validate
