name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python examples/demo/tools/codex_dm.py validate --root examples/demo
      - run: python -m pip install .
      - name: Smoke-test the installed package outside the repository
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "codex-dm-smoke"
          $answers = Get-Content "$env:GITHUB_WORKSPACE/examples/onboarding_answers.ru.json" -Raw -Encoding UTF8
          Set-Location $env:RUNNER_TEMP
          $answers | python -m codex_dm_kit create --answers - --target $target
          python (Join-Path $target "tools/codex_dm.py") validate
